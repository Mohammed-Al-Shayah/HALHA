<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      // Safe guard against libraries attempting to write to read-only/getter-only window.fetch in the sandboxed preview iframe
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return originalFetch;
            },
            set(val) {
              console.warn("Intercepted attempt to set window.fetch to prevent TypeError.", val);
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch property descriptor, skipping.", e);
        }

        // Safe guard against libraries or system scripts parsing "undefined" or empty values as JSON
        try {
          const originalParse = JSON.parse;
          JSON.parse = function(text, reviver) {
            if (text === undefined || text === 'undefined' || text === null) {
              console.warn("Intercepted JSON.parse of undefined/null to prevent SyntaxError.");
              return undefined;
            }
            try {
              return originalParse(text, reviver);
            } catch (err) {
              if (typeof text === 'string' && (text.trim() === 'undefined' || text.trim() === '')) {
                console.warn("Intercepted JSON.parse of empty/undefined string to prevent SyntaxError.", text);
                return undefined;
              }
              throw err;
            }
          };
        } catch (e) {
          console.warn("Could not patch JSON.parse, skipping.", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حلّها | منصة إدارة المرتجعات والشكاوى الذكية</title>
    <!-- Import Google Fonts: Cairo for modern Arabic, and Inter for numbers/UI elements -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#faf8f5] text-[#1c1917] font-sans antialiased selection:bg-teal-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
